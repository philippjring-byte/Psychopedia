<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Psychopedia"/>
<meta name="theme-color" content="#3D6B5E"/>
<title>Psychopedia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --green:    #3D6B5E;
  --green-lt: #EAF2EF;
  --green-md: #C5DFDA;
  --cream:    #FAF7F2;
  --paper:    #FFFFFF;
  --ink:      #1E1E1E;
  --ink-2:    #555555;
  --ink-3:    #999999;
  --border:   #E4DDD3;
  --shadow:   0 2px 12px rgba(0,0,0,0.08);
  --radius:   14px;
  --nav-h:    56px;
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--cream); color: var(--ink);
  font-family: 'DM Sans', sans-serif; font-size: 16px;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100%; width: 100%; }

.screen { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain; }
.screen.active { display: flex; flex-direction: column; }

/* ── Top Bar ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 10px; padding-top: calc(14px + env(safe-area-inset-top, 0px));
  background: var(--paper); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100; flex-shrink: 0;
}
.topbar-title {
  font-family: 'Lora', serif; font-size: 18px; font-weight: 700; color: var(--ink);
}
.topbar-logo { display: flex; align-items: center; gap: 8px; }
.topbar-logo-mark { color: var(--green); font-size: 22px; font-family: 'Lora', serif; line-height: 1; }

/* ── Bottom Nav ── */
#bottom-nav {
  display: flex; background: var(--paper); border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bot); flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 9px 0; border: none; background: none; cursor: pointer;
  color: var(--ink-3); font-size: 10px; font-family: 'DM Sans', sans-serif;
  font-weight: 500; transition: color 0.15s;
}
.nav-btn svg { transition: transform 0.15s; }
.nav-btn.active { color: var(--green); }
.nav-btn.active svg { transform: scale(1.12); }

/* ── Cards ── */
.entry-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

.entry-card {
  background: var(--paper); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 16px;
  cursor: pointer; transition: transform 0.12s;
  border-left: 4px solid var(--green);
  -webkit-user-select: none; user-select: none;
}
.entry-card:active { transform: scale(0.98); }
.card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.card-cat { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
.card-date { font-size: 11px; color: var(--ink-3); }
.card-title { font-family: 'Lora', serif; font-size: 17px; font-weight: 700; margin-bottom: 5px; line-height: 1.3; }
.card-preview { font-size: 13px; color: var(--ink-2); line-height: 1.5; margin-bottom: 8px; }
.tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
.tag { font-size: 11px; background: var(--green-lt); color: var(--green); padding: 2px 8px; border-radius: 20px; }
.card-img-badge { font-size: 11px; color: var(--ink-3); }

/* ── Search Bar ── */
.search-bar {
  padding: 12px 16px 4px; background: var(--cream); position: sticky; top: 57px; z-index: 90;
}
.search-inner {
  display: flex; align-items: center; gap: 8px;
  background: var(--paper); border: 1px solid var(--border);
  border-radius: 12px; padding: 9px 14px;
}
.search-inner input {
  flex: 1; border: none; outline: none; font-size: 16px;
  font-family: 'DM Sans', sans-serif; background: none; color: var(--ink);
}
.search-inner input::placeholder { color: var(--ink-3); }

/* ── Category Pills ── */
.cat-scroll {
  display: flex; gap: 10px; padding: 14px 16px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-pill {
  flex-shrink: 0; padding: 9px 18px; border-radius: 22px;
  border: 1.5px solid var(--border); background: var(--paper);
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  font-weight: 500; cursor: pointer; color: var(--ink-2);
  transition: all 0.15s; white-space: nowrap;
}
.cat-pill.active { background: var(--green); border-color: var(--green); color: #fff; }

/* ── FAB ── */
.fab {
  position: fixed; right: 20px;
  bottom: calc(var(--nav-h) + var(--safe-bot) + 16px);
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--green); color: #fff; border: none;
  font-size: 28px; line-height: 1; cursor: pointer;
  box-shadow: 0 4px 16px rgba(61,107,94,0.4);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s; z-index: 200;
}
.fab:active { transform: scale(0.93); }

/* ── Detail ── */
.detail-header { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); background: var(--paper); }
.detail-cat-badge {
  display: inline-block; font-size: 10px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  padding: 3px 10px; border-radius: 6px; margin-bottom: 8px;
}
.detail-title { font-family: 'Lora', serif; font-size: 24px; font-weight: 700; line-height: 1.25; margin-bottom: 10px; }
.detail-body-wrap { padding: 20px 18px; }
.detail-body { font-size: 15px; line-height: 1.85; color: var(--ink); }
.detail-body h2 { font-family: 'Lora', serif; font-size: 19px; margin: 20px 0 8px; }
.detail-body h3 { font-family: 'Lora', serif; font-size: 16px; margin: 16px 0 6px; }
.detail-body p { margin-bottom: 12px; }
.detail-body ul, .detail-body ol { padding-left: 20px; margin-bottom: 12px; }
.detail-body li { margin-bottom: 4px; }
.detail-body blockquote {
  border-left: 3px solid var(--green); padding-left: 14px;
  margin: 12px 0; color: var(--ink-2); font-style: italic;
}
.wikilink { color: var(--green); text-decoration: underline; font-weight: 600; cursor: pointer; }

.section-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px;
}
.img-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.img-thumb-wrap { border-radius: 10px; overflow: hidden; background: var(--border); aspect-ratio: 4/3; }
.img-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
.img-name { font-size: 11px; color: var(--ink-3); padding: 4px 6px; background: var(--cream); }

.linked-list { display: flex; flex-direction: column; gap: 6px; }
.link-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--green-lt); border: 1px solid var(--green-md);
  border-radius: 10px; padding: 10px 14px; cursor: pointer;
  font-size: 14px; color: var(--green); font-weight: 500;
  text-align: left; width: 100%;
}

.detail-actions {
  display: flex; gap: 10px; margin-top: 12px;
}
.btn-icon {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px; border-radius: 10px; border: 1.5px solid var(--border);
  background: var(--paper); font-size: 13px; font-weight: 600;
  cursor: pointer; color: var(--ink-2); font-family: 'DM Sans', sans-serif;
}
.btn-icon.danger { color: #C0392B; border-color: #F5C6C6; background: #FFF5F5; }

/* ── Editor ── */
.editor-wrap { display: flex; flex-direction: column; flex: 1; }
.editor-field { padding: 0 18px; margin-bottom: 16px; }
.editor-field label {
  display: block; font-size: 10px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--ink-3); margin-bottom: 6px;
}
.editor-title-input {
  width: 100%; font-family: 'Lora', serif; font-size: 22px; font-weight: 700;
  border: none; outline: none; background: none; color: var(--ink);
  border-bottom: 2px solid var(--border); padding-bottom: 8px;
  padding-top: 4px;
}
.editor-body-toolbar {
  display: flex; gap: 4px; flex-wrap: wrap; padding: 8px 12px;
  background: #F5F1EC; border-bottom: 1px solid var(--border);
}
.tb-btn {
  padding: 6px 10px; border: none; background: none; cursor: pointer;
  border-radius: 6px; color: var(--ink-2); font-size: 13px;
  font-family: 'DM Sans', sans-serif;
}
.tb-btn:active { background: var(--border); }
.tb-divider { width: 1px; height: 20px; background: var(--border); margin: 0 2px; align-self: center; }
.editor-body {
  min-height: 180px; padding: 14px 18px; outline: none;
  font-size: 15px; line-height: 1.8; color: var(--ink);
  border: 1px solid var(--border); border-top: none;
  border-radius: 0 0 10px 10px; background: var(--paper);
}
.editor-body:empty::before { content: attr(data-placeholder); color: var(--ink-3); }

select.field-select {
  width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 16px; font-family: 'DM Sans', sans-serif;
  background: var(--paper); color: var(--ink); outline: none;
  -webkit-appearance: none; appearance: none;
}
.tag-input-row { display: flex; gap: 8px; }
.tag-input-row input {
  flex: 1; padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 16px; font-family: 'DM Sans', sans-serif;
  background: var(--paper); color: var(--ink); outline: none;
}
.btn-green {
  padding: 10px 16px; background: var(--green); color: #fff;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
  font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap;
}
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.editor-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--green-lt); color: var(--green);
  padding: 4px 10px; border-radius: 20px; font-size: 12px;
}
.tag-x { background: none; border: none; cursor: pointer; color: var(--green); font-size: 16px; line-height: 1; }

.img-add-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 12px; border: 2px dashed var(--green-md);
  border-radius: 10px; background: var(--green-lt); color: var(--green);
  font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer;
}
.img-preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
.img-preview-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 1; }
.img-preview-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.img-remove {
  position: absolute; top: 3px; right: 3px; width: 22px; height: 22px;
  background: rgba(0,0,0,0.55); color: #fff; border: none; border-radius: 50%;
  font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.link-picker-list { display: flex; flex-direction: column; gap: 4px; max-height: 240px; overflow-y: auto; }
.link-picker-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  border-radius: 8px; background: var(--cream); cursor: pointer;
}
.link-picker-item input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--green); }
.link-picker-item .lp-title { flex: 1; font-size: 14px; }
.link-picker-item .lp-cat { font-size: 11px; color: var(--ink-3); }

/* ── Save Bar ── */
.save-bar {
  padding: 12px 18px; padding-bottom: calc(12px + var(--safe-bot));
  background: var(--paper); border-top: 1px solid var(--border);
  display: flex; gap: 10px; flex-shrink: 0;
}
.btn-cancel {
  flex: 1; padding: 13px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 15px; font-weight: 600;
  font-family: 'DM Sans', sans-serif; background: none; color: var(--ink-2); cursor: pointer;
}
.btn-save {
  flex: 2; padding: 13px; background: var(--green); color: #fff;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
  font-family: 'DM Sans', sans-serif; cursor: pointer;
}

/* ── Empty State ── */
.empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 40px 20px; text-align: center; color: var(--ink-3);
}
.empty-icon { font-size: 52px; margin-bottom: 14px; }
.empty-text { font-size: 16px; margin-bottom: 20px; }

/* ── Settings Screen ── */
.settings-wrap { padding: 16px; }
.settings-section { background: var(--paper); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; box-shadow: var(--shadow); }
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 15px;
}
.settings-row:last-child { border-bottom: none; }
.settings-row-label { font-weight: 500; }
.settings-row-sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
.settings-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--ink-3); padding: 12px 16px 6px; }
.cat-manage-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.cat-manage-item:last-child { border-bottom: none; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; }
.cat-del-btn { background: none; border: none; color: #C0392B; font-size: 20px; cursor: pointer; }
.new-cat-row { display: flex; gap: 8px; padding: 12px 16px; }
.new-cat-input {
  flex: 1; padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 16px; font-family: 'DM Sans', sans-serif; outline: none;
}

/* ── Divider ── */
.section-divider { height: 1px; background: var(--border); margin: 0 0 20px; }

/* ── Modal overlay ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 500; display: flex; align-items: flex-end;
}
.modal-sheet {
  background: var(--paper); width: 100%; border-radius: 20px 20px 0 0;
  padding: 20px 18px; padding-bottom: calc(20px + var(--safe-bot));
  max-height: 75vh; overflow-y: auto;
}
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-family: 'Lora', serif; font-size: 18px; font-weight: 700; margin-bottom: 14px; }

/* ── Animations ── */
@keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
.screen.active .entry-card { animation: slideUp 0.2s ease both; }
</style>
</head>
<body>
<div id="app">

  <!-- ── HOME SCREEN ── -->
  <div id="screen-home" class="screen active">
    <div class="topbar">
      <div class="topbar-logo">
        <span class="topbar-logo-mark">Ψ</span>
        <span class="topbar-title">Psychopedia</span>
      </div>
      <svg id="home-search-icon" onclick="focusSearch()" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="cursor:pointer;color:var(--ink-2)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>

    <div class="search-bar">
      <div class="search-inner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink-3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" type="search" placeholder="Einträge suchen…" oninput="renderHome()"/>
      </div>
    </div>

    <div id="cat-pills" class="cat-scroll"></div>
    <div id="entry-list" class="entry-list"></div>
  </div>

  <!-- ── DETAIL SCREEN ── -->
  <div id="screen-detail" class="screen">
    <div class="topbar">
      <button onclick="showScreen('home')" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--green);font-size:15px;font-weight:600;font-family:inherit;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Zurück
      </button>
      <div style="display:flex;gap:8px;">
        <button id="edit-btn" onclick="openEditor(currentDetailId)" style="background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;color:var(--ink-2);">Bearbeiten</button>
      </div>
    </div>
    <div id="detail-content" style="flex:1;overflow-y:auto;"></div>
  </div>

  <!-- ── EDITOR SCREEN ── -->
  <div id="screen-editor" class="screen">
    <div class="topbar">
      <button id="editor-cancel" onclick="cancelEditor()" style="background:none;border:none;cursor:pointer;color:var(--ink-2);font-size:15px;font-family:inherit;">Abbrechen</button>
      <span class="topbar-title" id="editor-heading">Neuer Eintrag</span>
      <div style="width:80px;"></div>
    </div>
    <div class="editor-wrap" id="editor-inner"></div>
    <div class="save-bar">
      <button class="btn-cancel" onclick="cancelEditor()">Abbrechen</button>
      <button class="btn-save" onclick="saveEntry()">Speichern</button>
    </div>
  </div>

  <!-- ── SETTINGS SCREEN ── -->
  <div id="screen-settings" class="screen">
    <div class="topbar">
      <div class="topbar-logo">
        <span class="topbar-logo-mark">Ψ</span>
        <span class="topbar-title">Einstellungen</span>
      </div>
    </div>
    <div class="settings-wrap" id="settings-content"></div>
  </div>

  <!-- Bottom Nav -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Wiki
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Einstellungen
    </button>
  </nav>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openEditor(null)" title="Neuer Eintrag">+</button>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const CAT_COLORS = ["#3D6B5E","#7B6FA0","#C4785B","#5B8DB8","#8FAF5A","#B85B8D","#5BA8AF","#AF955B"];
let entries    = JSON.parse(localStorage.getItem('pw_entries')    || '[]');
let categories = JSON.parse(localStorage.getItem('pw_categories') || '["Störungsbilder","Interventionen","Theorien","Diagnostik","Sonstiges"]');
let filterCat  = 'Alle';
let editingId  = null;
let currentDetailId = null;
// editor state
let editorImages = [];
let editorLinks  = [];
let editorTags   = [];

function persist() {
  localStorage.setItem('pw_entries', JSON.stringify(entries));
}
function persistCats() {
  localStorage.setItem('pw_categories', JSON.stringify(categories));
}
function catColor(name) {
  const i = categories.indexOf(name);
  return CAT_COLORS[i % CAT_COLORS.length] || CAT_COLORS[0];
}

// ── Navigation ───────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById('nav-' + name);
  if (navBtn) navBtn.classList.add('active');
  document.getElementById('fab').style.display = (name === 'home') ? 'flex' : 'none';
  if (name === 'home')     renderHome();
  if (name === 'settings') renderSettings();
}

// ── Home ─────────────────────────────────────────────────────────────────────
function renderHome() {
  renderCatPills();
  const q   = (document.getElementById('search-input').value || '').toLowerCase().trim();
  let list  = entries;
  if (filterCat !== 'Alle') list = list.filter(e => e.category === filterCat);
  if (q) list = list.filter(e =>
    (e.title||'').toLowerCase().includes(q) ||
    (e.body||'').replace(/<[^>]+>/g,'').toLowerCase().includes(q) ||
    (e.tags||[]).some(t => t.toLowerCase().includes(q))
  );
  list = list.sort((a,b) => (a.title||'').localeCompare(b.title,'de'));

  const el = document.getElementById('entry-list');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📖</div>
      <div class="empty-text">${q ? 'Keine Einträge gefunden' : 'Noch keine Einträge'}</div>
      ${!q ? `<button class="btn-green" onclick="openEditor(null)">Ersten Eintrag anlegen</button>` : ''}
    </div>`;
    return;
  }
  el.innerHTML = list.map((e, i) => {
    const color   = catColor(e.category);
    const preview = (e.body||'').replace(/<[^>]+>/g,'').slice(0,100);
    const date    = new Date(parseInt(e.id)||Date.now()).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
    const tagsHtml = (e.tags||[]).slice(0,3).map(t=>`<span class="tag">#${t}</span>`).join('');
    return `<div class="entry-card" style="border-left-color:${color};animation-delay:${i*0.04}s" onclick="openDetail('${e.id}')">
      <div class="card-top">
        <span class="card-cat" style="color:${color}">${esc(e.category)}</span>
        <span style="display:flex;align-items:center;gap:8px;">
          ${(e.images||[]).length > 0 ? `<span class="card-img-badge">📎 ${e.images.length}</span>` : ''}
          <span class="card-date">${date}</span>
        </span>
      </div>
      <div class="card-title">${esc(e.title)}</div>
      ${preview ? `<div class="card-preview">${esc(preview)}…</div>` : ''}
      ${tagsHtml ? `<div class="tag-row">${tagsHtml}</div>` : ''}
    </div>`;
  }).join('');
}

function renderCatPills() {
  const all = ['Alle', ...categories];
  document.getElementById('cat-pills').innerHTML = all.map(c => `
    <button class="cat-pill ${filterCat===c?'active':''}" onclick="setFilter('${esc(c)}')">${esc(c)}</button>
  `).join('');
}
function setFilter(cat) { filterCat = cat; renderHome(); }
function focusSearch() { document.getElementById('search-input').focus(); }

// ── Detail ───────────────────────────────────────────────────────────────────
function openDetail(id) {
  currentDetailId = id;
  const e = entries.find(x => x.id === id);
  if (!e) return;
  const color = catColor(e.category);

  // replace [[id]] with wikilinks
  let body = e.body || '';
  entries.forEach(x => {
    body = body.replaceAll(`[[${x.id}]]`,
      `<span class="wikilink" onclick="openDetail('${x.id}')">${esc(x.title)}</span>`);
  });

  const tagsHtml = (e.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('');
  const linkedEntries = (e.links||[]).map(id=>entries.find(x=>x.id===id)).filter(Boolean);
  const imagesHtml = (e.images||[]).map(img=>`
    <div class="img-thumb-wrap" onclick="openImg('${img.data}')">
      <img class="img-thumb" src="${img.data}" alt="${esc(img.name||'Bild')}"/>
    </div>
    ${img.name ? `<div class="img-name">${esc(img.name)}</div>` : ''}
  `).join('');

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div class="detail-cat-badge" style="background:${color}22;color:${color}">${esc(e.category)}</div>
      <div class="detail-title">${esc(e.title)}</div>
      ${tagsHtml ? `<div class="tag-row" style="margin-bottom:10px;">${tagsHtml}</div>` : ''}
      <div class="detail-actions">
        <button class="btn-icon" onclick="openEditor('${e.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Bearbeiten
        </button>
        <button class="btn-icon danger" onclick="deleteEntry('${e.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Löschen
        </button>
      </div>
    </div>
    <div class="detail-body-wrap">
      <div class="detail-body">${body}</div>
      ${(e.images||[]).length > 0 ? `
        <div style="margin-top:28px;">
          <div class="section-label">Bilder & Aufzeichnungen</div>
          <div class="img-grid">${imagesHtml}</div>
        </div>` : ''}
      ${linkedEntries.length > 0 ? `
        <div style="margin-top:28px;">
          <div class="section-label">Verknüpfte Einträge</div>
          <div class="linked-list">
            ${linkedEntries.map(le=>`
              <button class="link-chip" onclick="openDetail('${le.id}')">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                ${esc(le.title)}
                <span style="margin-left:auto;font-size:11px;color:var(--ink-3);">${esc(le.category)}</span>
              </button>`).join('')}
          </div>
        </div>` : ''}
      <div style="height:40px;"></div>
    </div>`;

  showScreen('detail');
  document.getElementById('screen-detail').scrollTop = 0;
  document.getElementById('fab').style.display = 'none';
}

function openImg(src) {
  const w = window.open(); w.document.write(`<img src="${src}" style="max-width:100%;max-height:100vh;display:block;margin:auto;">`);
}
function deleteEntry(id) {
  if (!confirm('Eintrag wirklich löschen?')) return;
  entries = entries.filter(e => e.id !== id);
  persist();
  showScreen('home');
}

// ── Editor ───────────────────────────────────────────────────────────────────
function openEditor(id) {
  editingId    = id || null;
  const e      = id ? entries.find(x => x.id === id) : null;
  editorImages = e ? [...(e.images||[])] : [];
  editorLinks  = e ? [...(e.links||[])]  : [];
  editorTags   = e ? [...(e.tags||[])]   : [];

  document.getElementById('editor-heading').textContent = e ? 'Bearbeiten' : 'Neuer Eintrag';

  const otherEntries = entries.filter(x => x.id !== id);

  document.getElementById('editor-inner').innerHTML = `
    <div style="padding:18px 18px 12px;border-bottom:1px solid var(--border);background:var(--paper);flex-shrink:0;">
      <input id="ed-title" class="editor-title-input" placeholder="Titel…" value="${esc(e?.title||'')}" autocomplete="off"/>
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px 0;">

      <div class="editor-field">
        <label>Kategorie</label>
        <select id="ed-cat" class="field-select">
          ${categories.map(c=>`<option${e?.category===c?' selected':''}>${esc(c)}</option>`).join('')}
        </select>
      </div>

      <div class="editor-field">
        <label>Tags</label>
        <div class="tag-input-row">
          <input id="ed-tag-input" type="text" placeholder="Tag eingeben…" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag();}"/>
          <button class="btn-green" onclick="addTag()">+</button>
        </div>
        <div class="tag-list" id="ed-tags"></div>
      </div>

      <div class="editor-field">
        <label>Inhalt</label>
        <div class="editor-body-toolbar">
          <button class="tb-btn" onmousedown="e(event,'bold')" title="Fett"><b>B</b></button>
          <button class="tb-btn" onmousedown="e(event,'italic')" title="Kursiv"><i>I</i></button>
          <button class="tb-btn" onmousedown="e(event,'underline')" title="Unterstrichen"><u>U</u></button>
          <div class="tb-divider"></div>
          <button class="tb-btn" onmousedown="e(event,'insertUnorderedList')" title="Liste">☰</button>
          <div class="tb-divider"></div>
          <span style="font-size:11px;color:var(--ink-3);align-self:center;margin:0 2px;">Markieren:</span>
          <button class="tb-btn tb-highlight" onmousedown="highlight(event,'#FFF176')" title="Gelb" style="background:#FFF176;border:1.5px solid #E0D800;width:26px;height:26px;border-radius:50%;padding:0;"></button>
          <button class="tb-btn tb-highlight" onmousedown="highlight(event,'#A8E6CF')" title="Grün" style="background:#A8E6CF;border:1.5px solid #5DBF8A;width:26px;height:26px;border-radius:50%;padding:0;"></button>
          <button class="tb-btn tb-highlight" onmousedown="highlight(event,'#FFCCBC')" title="Orange" style="background:#FFCCBC;border:1.5px solid #FF8A65;width:26px;height:26px;border-radius:50%;padding:0;"></button>
          <button class="tb-btn tb-highlight" onmousedown="highlight(event,'#BBDEFB')" title="Blau" style="background:#BBDEFB;border:1.5px solid #64B5F6;width:26px;height:26px;border-radius:50%;padding:0;"></button>
          <button class="tb-btn tb-highlight" onmousedown="highlight(event,'transparent')" title="Markierung entfernen" style="background:linear-gradient(135deg,#fff 45%,#f00 45%,#f00 55%,#fff 55%);border:1.5px solid var(--border);width:26px;height:26px;border-radius:50%;padding:0;"></button>
        </div>
        <div id="ed-body" class="editor-body" contenteditable="true" data-placeholder="Inhalt des Eintrags…"></div>
      </div>

      <div class="editor-field">
        <label>Bilder & Screenshots</label>
        <label class="img-add-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Bilder hinzufügen
          <input type="file" accept="image/*" multiple hidden onchange="addImages(this.files)"/>
        </label>
        <div class="img-preview-grid" id="ed-imgs"></div>
      </div>

      <div class="editor-field">
        <label>Verknüpfte Einträge</label>
        ${otherEntries.length === 0 ? '<div style="color:var(--ink-3);font-size:13px;">Noch keine anderen Einträge vorhanden.</div>' : `
        <div class="link-picker-list" id="ed-links">
          ${otherEntries.map(x=>`
            <label class="link-picker-item">
              <input type="checkbox" ${editorLinks.includes(x.id)?'checked':''} onchange="toggleLink('${x.id}')"/>
              <span class="lp-title">${esc(x.title)}</span>
              <span class="lp-cat">${esc(x.category)}</span>
            </label>`).join('')}
        </div>`}
      </div>
      <div style="height:20px;"></div>
    </div>`;

  // set body HTML
  const bodyEl = document.getElementById('ed-body');
  if (bodyEl && e?.body) bodyEl.innerHTML = e.body;

  renderEditorTags();
  renderEditorImages();

  showScreen('editor');
  document.getElementById('screen-editor').scrollTop = 0;
  document.getElementById('fab').style.display = 'none';
}

function e(ev, cmd) { ev.preventDefault(); document.execCommand(cmd, false, null); }
function highlight(ev, color) {
  ev.preventDefault();
  if (color === 'transparent') {
    document.execCommand('hiliteColor', false, 'transparent');
    document.execCommand('backColor', false, 'transparent');
  } else {
    document.execCommand('hiliteColor', false, color);
  }
}

function addTag() {
  const input = document.getElementById('ed-tag-input');
  const t = input.value.trim().toLowerCase().replace(/\s+/g,'-');
  if (t && !editorTags.includes(t)) { editorTags.push(t); renderEditorTags(); }
  input.value = '';
}
function removeTag(t) { editorTags = editorTags.filter(x=>x!==t); renderEditorTags(); }
function renderEditorTags() {
  const el = document.getElementById('ed-tags');
  if (!el) return;
  el.innerHTML = editorTags.map(t=>`
    <span class="editor-tag">#${esc(t)}<button class="tag-x" onclick="removeTag('${esc(t)}')">×</button></span>
  `).join('');
}

function addImages(files) {
  [...files].forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      editorImages.push({ data: ev.target.result, name: file.name });
      renderEditorImages();
    };
    reader.readAsDataURL(file);
  });
}
function removeImage(i) { editorImages.splice(i,1); renderEditorImages(); }
function renderEditorImages() {
  const el = document.getElementById('ed-imgs');
  if (!el) return;
  el.innerHTML = editorImages.map((img,i)=>`
    <div class="img-preview-item">
      <img src="${img.data}" alt="${esc(img.name)}"/>
      <button class="img-remove" onclick="removeImage(${i})">×</button>
    </div>`).join('');
}

function toggleLink(id) {
  if (editorLinks.includes(id)) editorLinks = editorLinks.filter(x=>x!==id);
  else editorLinks.push(id);
}

function cancelEditor() {
  if (editingId) openDetail(editingId);
  else showScreen('home');
}

function saveEntry() {
  const title = document.getElementById('ed-title')?.value?.trim();
  if (!title) { alert('Bitte einen Titel eingeben.'); return; }
  const cat  = document.getElementById('ed-cat')?.value;
  const body = document.getElementById('ed-body')?.innerHTML || '';

  const entry = {
    id:       editingId || Date.now().toString(),
    title, category: cat, tags: editorTags,
    body, images: editorImages, links: editorLinks,
  };

  if (editingId) {
    entries = entries.map(e => e.id === editingId ? entry : e);
  } else {
    entries.push(entry);
  }
  persist();
  currentDetailId = entry.id;
  openDetail(entry.id);
}

// ── Settings ─────────────────────────────────────────────────────────────────
function renderSettings() {
  document.getElementById('settings-content').innerHTML = `
    <div class="settings-section-title">Kategorien</div>
    <div class="settings-section">
      ${categories.map((c,i)=>`
        <div class="cat-manage-item">
          <span class="cat-dot" style="background:${CAT_COLORS[i%CAT_COLORS.length]};"></span>
          <span style="flex:1;font-size:15px;">${esc(c)}</span>
          <button class="cat-del-btn" onclick="deleteCategory('${esc(c)}')">×</button>
        </div>`).join('')}
      <div class="new-cat-row">
        <input class="new-cat-input" id="new-cat-input" placeholder="Neue Kategorie…" onkeydown="if(event.key==='Enter')addCategory()"/>
        <button class="btn-green" onclick="addCategory()">+ Hinzufügen</button>
      </div>
    </div>

    <div class="settings-section-title">Daten</div>
    <div class="settings-section">
      <div class="settings-row">
        <div>
          <div class="settings-row-label">Einträge</div>
          <div class="settings-row-sub">${entries.length} gespeichert</div>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink-3)"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <div class="settings-row" style="cursor:pointer;" onclick="exportData()">
        <div>
          <div class="settings-row-label">Daten exportieren</div>
          <div class="settings-row-sub">Backup als JSON-Datei</div>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink-3)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
      <div class="settings-row" style="cursor:pointer;" onclick="document.getElementById('import-file').click()">
        <div>
          <div class="settings-row-label">Daten importieren</div>
          <div class="settings-row-sub">JSON-Backup wiederherstellen</div>
        </div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink-3)"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <input type="file" id="import-file" accept=".json" hidden onchange="importData(this)"/>
    </div>

    <div class="settings-section-title">Info</div>
    <div class="settings-section">
      <div class="settings-row">
        <div>
          <div class="settings-row-label">Psychopedia</div>
          <div class="settings-row-sub">Offline · Daten lokal gespeichert</div>
        </div>
        <span style="font-size:22px;color:var(--green);font-family:'Lora',serif;">Ψ</span>
      </div>
    </div>
  `;
}

function addCategory() {
  const input = document.getElementById('new-cat-input');
  const name  = input.value.trim();
  if (!name || categories.includes(name)) return;
  categories.push(name);
  persistCats();
  input.value = '';
  renderSettings();
}
function deleteCategory(name) {
  const inUse = entries.some(e => e.category === name);
  if (inUse && !confirm(`Kategorie „${name}" wird von Einträgen verwendet. Trotzdem löschen?`)) return;
  categories = categories.filter(c => c !== name);
  persistCats();
  renderSettings();
}

function exportData() {
  const data = JSON.stringify({ entries, categories }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'PsychoWiki-Backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function importData(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!Array.isArray(d.entries)) throw new Error();
      if (confirm(`${d.entries.length} Einträge importieren? Vorhandene Daten werden ersetzt.`)) {
        entries    = d.entries;
        categories = d.categories || categories;
        persist(); persistCats();
        renderSettings();
        alert('Import erfolgreich!');
      }
    } catch { alert('Ungültige Datei.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
